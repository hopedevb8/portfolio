name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GATSBY_CPU_COUNT: 1
      GATSBY_API_BASE_URL: ${{ vars.GATSBY_API_BASE_URL }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        run: npm ci

      - name: Verify API Base URL
        run: |
          if [ -n "$GATSBY_API_BASE_URL" ]; then
            echo "GATSBY_API_BASE_URL is set"
            echo "GATSBY_API_BASE_URL=$GATSBY_API_BASE_URL"
          else
            echo "GATSBY_API_BASE_URL is missing"
            exit 1
          fi

      - name: Build Project
        run: node scripts/run-gatsby.cjs build --prefix-paths

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
